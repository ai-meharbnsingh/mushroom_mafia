# =============================================================================
# Mushroom Farm IoT Platform - CI/CD Pipeline
# =============================================================================
# Runs on every push/PR to main.
#
# Jobs:
#   1. backend-checks    - Python lint, format, syntax
#   2. backend-tests     - pytest (SQLite, no external services needed)
#   3. frontend-checks   - TypeScript type-check, production build
#   4. frontend-tests    - Vitest unit tests
#   5. firmware-checks   - PlatformIO ESP32 compile
#   6. deploy-backend    - Railway deploy (main branch only, after all tests pass)
#   7. deploy-frontend   - Vercel deploy (main branch only, after all tests pass)
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   RAILWAY_TOKEN        - Railway API token (railway.app → Account → Tokens)
#   VERCEL_TOKEN         - Vercel token (vercel.com → Settings → Tokens)
#   VERCEL_ORG_ID        - From .vercel/project.json or `vercel link`
#   VERCEL_PROJECT_ID    - From .vercel/project.json or `vercel link`
# =============================================================================

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: Backend Checks (Python 3.11)
  # Linting, format verification, syntax check
  # ===========================================================================
  backend-checks:
    name: Backend Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-lint-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff lint
        run: ruff check backend/app/

      - name: Ruff format
        run: ruff format --check backend/app/

      - name: Python syntax check
        run: |
          pip install -r backend/requirements.txt
          find backend/app/ -name "*.py" -exec python -m py_compile {} +

  # ===========================================================================
  # Job 2: Backend Tests (pytest + SQLite)
  # Runs all pytest tests using SQLite (conftest handles DB overrides).
  # No PostgreSQL or Redis needed — conftest uses aiosqlite + FakeRedis.
  # ===========================================================================
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    needs: [backend-checks]

    env:
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-key
      DEVICE_ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0xMjM0NQ==
      ENVIRONMENT: development

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-test-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-test-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run pytest
        working-directory: backend
        run: |
          python -m pytest tests/ -v --tb=short 2>&1 | tee test_output.txt
          # Fail if pytest exit code is non-zero
          test ${PIPESTATUS[0]} -eq 0

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-test-results
          path: backend/test_output.txt
          retention-days: 7

  # ===========================================================================
  # Job 3: Frontend Checks (Node.js 20)
  # TypeScript type checking and production build
  # ===========================================================================
  frontend-checks:
    name: Frontend Build & Typecheck
    runs-on: ubuntu-latest

    env:
      # Vite needs these at build time (safe defaults for CI)
      VITE_API_BASE_URL: http://localhost:3800/api/v1
      VITE_WS_BASE_URL: ws://localhost:3800/api/v1

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript type check
        run: cd frontend && npx tsc --noEmit

      - name: Production build
        run: cd frontend && npm run build

  # ===========================================================================
  # Job 4: Frontend Tests (Vitest)
  # Unit tests with jsdom
  # ===========================================================================
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    needs: [frontend-checks]

    env:
      VITE_API_BASE_URL: http://localhost:3800/api/v1
      VITE_WS_BASE_URL: ws://localhost:3800/api/v1

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run Vitest
        run: cd frontend && npm run test

  # ===========================================================================
  # Job 5: Firmware Checks (PlatformIO / ESP32)
  # Compile only — no upload to hardware
  # ===========================================================================
  firmware-checks:
    name: Firmware Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('Firmware/platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile ESP32 firmware
        run: cd Firmware && pio run

  # ===========================================================================
  # Note: Railway backend auto-deploys from main via its GitHub integration.
  # No CI deploy step needed — Railway watches the repo directly.
  # ===========================================================================

  # ===========================================================================
  # Job 7: Deploy Frontend (Vercel)
  # Only on push to main, after ALL test jobs pass.
  # Requires VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID secrets.
  # ===========================================================================
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, firmware-checks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
