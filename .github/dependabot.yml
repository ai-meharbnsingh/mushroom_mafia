version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    assignees:
      - "ai-meharbnsingh"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    assignees:
      - "ai-meharbnsingh"

  - package-ecosystem: "npm"
    directory: "/marketing_site/app"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    assignees:
      - "ai-meharbnsingh"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    assignees:
      - "ai-meharbnsingh"
