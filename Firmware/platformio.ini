; PlatformIO configuration for Mushroom Farm IoT ESP32 device
; Board: ESP32 WROOM (DevKit V1)

[platformio]
src_dir = src/main

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
; upload_port = /dev/cu.usbserial-0001
; monitor_port = /dev/cu.usbserial-0001


; Local libraries directory (Sensirion, AsyncTCP, AsyncElegantOTA, DHT, DallasTemp, LCD, etc.)
lib_extra_dirs = libraries

; Dependencies NOT in local libraries/ — pull from registry
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.0
    paulstoffregen/OneWire@^2.3.8
    chris--a/Keypad@^3.1.1
    me-no-dev/ESPAsyncWebServer@^1.2.4

; Ensure PIO uses compatible library versions and doesn't double-include
lib_ldf_mode = deep+

; Dual-partition OTA layout (two 1.875MB app slots + SPIFFS)
board_build.partitions = partitions_ota.csv

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=1
