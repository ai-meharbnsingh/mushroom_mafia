services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mushroom_farm
      POSTGRES_USER: mushroom
      POSTGRES_PASSWORD: mushroom_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mushroom -d mushroom_farm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  emqx:
    image: emqx/emqx:5.8.6
    hostname: emqx-node
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "1883:1883"
      - "8883:8883"
      - "8083:8083"
      - "18083:18083"
    environment:
      EMQX_NODE__NAME: "emqx@emqx-node"
      EMQX_DASHBOARD__DEFAULT_PASSWORD: "admin123"
      EMQX_AUTHORIZATION__NO_MATCH: "allow"
      EMQX_LISTENERS__SSL__DEFAULT__KEYFILE: "/opt/emqx/etc/certs/server.key"
      EMQX_LISTENERS__SSL__DEFAULT__CERTFILE: "/opt/emqx/etc/certs/server.crt"
      EMQX_LISTENERS__SSL__DEFAULT__CACERTFILE: "/opt/emqx/etc/certs/ca.crt"
    volumes:
      - emqx_data:/opt/emqx/data
      - ./certs:/opt/emqx/etc/certs
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  emqx_data:
